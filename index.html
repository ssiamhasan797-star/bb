<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ani 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:radial-gradient(circle at 25% 25%, #6a0dad, transparent),
             radial-gradient(circle at 75% 75%, #f39c12, transparent),
             linear-gradient(135deg, #2c3e50, #8e44ad);
  color:#fff;
  perspective:1200px;
}
body::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, transparent 60%, rgba(0,0,0,0.7));
  pointer-events:none;
}

/* Glass card */
.container{
  position:relative;
  text-align:center;
  padding:35px 25px;
  border-radius:25px;
  background:linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,182,193,0.15));
  backdrop-filter:blur(25px);
  box-shadow:0 15px 50px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2);
  animation:fadeUp 1.5s ease;
  max-width:350px;
  transform-style:preserve-3d;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
}
.container:hover{
  transform:rotateX(6deg) rotateY(-6deg) scale(1.03);
  box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

/* Title */
h1{
  font-size:2.2rem;
  margin-bottom:18px;
  font-weight:700;
  background:linear-gradient(90deg,#ffffff,#ff9a9e,#fad0c4,#ffffff);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
  letter-spacing:1px;
}
@keyframes shine{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* Typed message */
#typedText{
  font-size:1rem;
  line-height:1.7;
  min-height:110px;
  border-right:2px solid rgba(255,255,255,0.6);
  display:inline-block;
  padding-right:6px;
}

/* Glow blobs */
.blob{
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.6;
  animation:float 12s infinite ease-in-out;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-60px)}
}

/* sparkles */
.sparkle{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  opacity:0.7;
  animation:sparkleAnim 3s infinite ease-in-out;
}
@keyframes sparkleAnim{
  0%,100%{opacity:0; transform:scale(0.5)}
  50%{opacity:1; transform:scale(1.2)}
}

/* falling lines */
.line{
  position:absolute;
  width:2px;
  height:80px;
  background:linear-gradient(to bottom, transparent, #ffffffaa);
  animation:fall linear infinite;
  opacity:0.6;
}
@keyframes fall{
  0%{transform:translateY(-100px); opacity:0}
  20%{opacity:1}
  100%{transform:translateY(110vh); opacity:0}
}

/* cursor glow */
.cursor-glow{
  position:fixed;
  width:150px;
  height:150px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,154,158,0.4), transparent 70%);
  pointer-events:none;
  transform:translate(-50%, -50%);
}

/* floating hearts */
.heart{
  position:absolute;
  width:20px;
  height:20px;
  background:linear-gradient(135deg, rgba(255,182,193,0.3), rgba(255,105,180,0.3));
  transform:rotate(45deg);
  border-radius:5px;
  pointer-events:none;
  animation:flyingHeart linear infinite;
}
.heart:before,
.heart:after{
  content:"";
  position:absolute;
  width:20px;
  height:20px;
  background:inherit;
  border-radius:50%;
}
.heart:before{top:-10px; left:0;}
.heart:after{left:-10px; top:0;}
@keyframes flyingHeart{
  0%{transform:translate(0,100vh) rotate(0deg); opacity:0}
  10%{opacity:1}
  25%{transform:translate(50vw,60vh) rotate(45deg)}
  50%{transform:translate(30vw,30vh) rotate(90deg)}
  75%{transform:translate(60vw,10vh) rotate(135deg)}
  100%{transform:translate(50vw,-10vh) rotate(180deg); opacity:0}
}

@media(max-width:600px){
  .container{width:90%}
}
</style>
</head>
<body>

<div class="cursor-glow" id="cursorGlow"></div>

<!-- blobs -->
<div class="blob" style="background:#ff6f91; top:10%; left:10%"></div>
<div class="blob" style="background:#ffc3a0; bottom:10%; right:10%"></div>

<div class="container">
  <h1>Happy Birthday Ani ✨</h1>
  <div id="typedText"></div>
</div>

<audio id="bgMusic" loop autoplay>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c0a7f4d7e.mp3?filename=romantic-soft-piano-110624.mp3" type="audio/mpeg">
</audio>

<script>
const message = `Dear Ani 🌸\nHappy Birthday to an amazing friend ✨\nMay your day be full of happiness, fun, and beautiful moments 🎉\nWishing you success, good health, and lots of smiles always 😊\nStay awesome and keep shining 🌷`;
let i = 0;
function typeEffect(){
  if(i < message.length){
    document.getElementById("typedText").innerHTML += message.charAt(i) === '\n' ? '<br>' : message.charAt(i);
    i++;
    setTimeout(typeEffect, 35);
  }
}
setTimeout(typeEffect, 700);

setTimeout(()=>{
  confetti({ particleCount:200, spread:120, startVelocity:40, origin:{y:0.6} });
},500);

window.addEventListener('click', ()=>{
  document.getElementById('bgMusic').play();
});

// sparkles
for(let i=0;i<40;i++){
  let s=document.createElement('div');
  s.classList.add('sparkle');
  s.style.left=Math.random()*100+'vw';
  s.style.top=Math.random()*100+'vh';
  s.style.animationDuration=(2+Math.random()*3)+'s';
  document.body.appendChild(s);
}

// falling lines
for(let i=0;i<35;i++){
  let l=document.createElement('div');
  l.classList.add('line');
  l.style.left=Math.random()*100+'vw';
  l.style.animationDuration=(1.8+Math.random()*1)+'s';
  l.style.animationDelay=Math.random()*1+'s';
  document.body.appendChild(l);
}

// floating hearts
for(let i=0;i<20;i++){
  let h = document.createElement('div');
  h.classList.add('heart');
  let size = 15 + Math.random()*20;
  h.style.width = size + 'px';
  h.style.height = size + 'px';
  h.style.left = Math.random()*100 + 'vw';
  h.style.animationDuration = 6 + Math.random()*6 + 's';
  h.style.animationDelay = Math.random()*5 + 's';
  document.body.appendChild(h);
}

// cursor glow follow
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', (e)=>{
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});
</script>

</body>
</html>
